events:
  - id: "sample-workshop"
    name: "UK Social Contract Workshop"
    description: "Mapping the health of the UK social contract across scenarios and policy areas"
    status: "active"
    participants:
      - slug: "red-cuddly-fox"
      - slug: "blue-gentle-owl"
      - slug: "warm-sleepy-panda"
      - slug: "bright-tiny-heron"
    sessions:
      - id: "opening-plenary"
        name: "Opening Plenary"
        type: "plenary"
        status: "open"
        order: 1
        questions:
          - id: "q1"
            prompt: "How would you describe health of UK social contract today?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"

      - id: "problem-mapping"
        name: "Problem Mapping"
        type: "breakout"
        status: "open"
        order: 2
        groups:
          - id: "a"
            name: "Group A"
          - id: "b"
            name: "Group B"
          - id: "c"
            name: "Group C"
          - id: "d"
            name: "Group D"
          - id: "e"
            name: "Group E"
          - id: "f"
            name: "Group F"
        questions:
          - id: "q2"
            prompt: "In Scenario 1, how would you describe health of UK social contract overall?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q3"
            prompt: "In Scenario 1, how would you describe health of UK social contract, with regards to energy?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q4"
            prompt: "In Scenario 1, how would you describe health of UK social contract, with regards to education?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q5"
            prompt: "In Scenario 1, how would you describe health of UK social contract, with regards to health?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q6"
            prompt: "In Scenario 2, how would you describe health of UK social contract overall?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q7"
            prompt: "In Scenario 2, how would you describe health of UK social contract, with regards to energy?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q8"
            prompt: "In Scenario 2, how would you describe health of UK social contract, with regards to education?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q9"
            prompt: "In Scenario 2, how would you describe health of UK social contract, with regards to health?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"

      - id: "solution-design"
        name: "Solution Design"
        type: "breakout"
        status: "open"
        order: 3
        groups:
          - id: "energy"
            name: "Energy"
          - id: "education"
            name: "Education"
          - id: "health"
            name: "Health"
          - id: "labour-market"
            name: "Labour Market"
          - id: "welfare"
            name: "Welfare"
          - id: "culture"
            name: "Culture"
        questions:
          - id: "q10"
            prompt: "In scenario 1, how would you describe the health of UK social contract w.r.t. your policy area?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q11"
            prompt: "In scenario 2, how would you describe the health of UK social contract w.r.t. your policy area?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q12"
            prompt: "In scenario 1, how would you describe the health of UK social contract w.r.t. your policy area after your proposed policies were delivered?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"
          - id: "q13"
            prompt: "In scenario 2, how would you describe the health of UK social contract w.r.t. your policy area after your proposed policies were delivered?"
            likert_labels:
              - "Systemic instability"
              - "Broken for everyone"
              - "Broken for some"
              - "Stable"
              - "Improving"

      - id: "closing-plenary"
        name: "Closing Plenary"
        type: "plenary"
        status: "open"
        order: 4
        questions:
          - id: "q14"
            prompt: "How would you rate the likelihood of scenario 1?"
            likert_labels:
              - "Improbable"
              - "Possible"
              - "Plausible"
              - "Probable"
              - "Happening"
          - id: "q15"
            prompt: "How would you rate the likelihood of scenario 2?"
            likert_labels:
              - "Improbable"
              - "Possible"
              - "Plausible"
              - "Probable"
              - "Happening"
